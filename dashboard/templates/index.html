<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务看板 - my-agent-teams</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>任务看板</h1>
    <div class="header-info">
      <span id="task-count"></span>
      <span id="last-update"></span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="kanban">看板</button>
    <button class="tab" data-tab="gantt">甘特图</button>
    <button class="tab" data-tab="agents">Agent 统计</button>
    <button class="tab" data-tab="analytics">分析</button>
  </nav>

  <main>
    <!-- Kanban View -->
    <section id="kanban" class="view active">
      <div class="filters-bar" id="kanban-filters">
        <select id="filter-project"><option value="">全部项目</option></select>
        <select id="filter-domain"><option value="">全部领域</option></select>
        <select id="filter-agent"><option value="">全部负责人</option></select>
        <select id="filter-owner-pm"><option value="">全部 Owner PM</option></select>
        <select id="filter-review-level"><option value="">全部审查级别</option></select>
        <select id="filter-merge-gate"><option value="">全部收口阶段</option></select>
        <button id="filter-reset" type="button" class="filter-reset">重置筛选</button>
      </div>
      <div class="kanban-board" id="kanban-board"></div>
    </section>

    <!-- Gantt View -->
    <section id="gantt" class="view">
      <div id="gantt-chart" class="chart-container"></div>
    </section>

    <!-- Agent Stats View -->
    <section id="agents" class="view">
      <div id="agent-tasks-chart" class="chart-container half"></div>
      <div id="agent-load-chart" class="chart-container half"></div>
    </section>

    <!-- Analytics View -->
    <section id="analytics" class="view">
      <div class="analytics-summary" id="analytics-summary">
        <div class="metric-card" id="mc-total"><div class="metric-value">-</div><div class="metric-label">任务总数</div></div>
        <div class="metric-card" id="mc-done"><div class="metric-value">-</div><div class="metric-label">已完成</div></div>
        <div class="metric-card" id="mc-rate"><div class="metric-value">-</div><div class="metric-label">完成率</div></div>
        <div class="metric-card" id="mc-avg-cycle"><div class="metric-value">-</div><div class="metric-label">平均周期</div></div>
        <div class="metric-card" id="mc-avg-dev"><div class="metric-value">-</div><div class="metric-label">平均开发耗时</div></div>
        <div class="metric-card" id="mc-blocked"><div class="metric-value">-</div><div class="metric-label">阻塞率</div></div>
      </div>
      <div class="analytics-charts">
        <div id="trend-chart" class="chart-container"></div>
        <div id="owner-pm-chart" class="chart-container half"></div>
        <div id="domain-chart" class="chart-container half"></div>
        <div id="role-efficiency-chart" class="chart-container"></div>
      </div>
    </section>

  </main>

  <div id="task-detail-backdrop" class="detail-backdrop hidden"></div>
  <aside id="task-detail-drawer" class="task-detail-drawer hidden" aria-hidden="true">
    <div class="drawer-header">
      <div>
        <h2 id="detail-title">任务详情</h2>
        <div id="detail-subtitle" class="drawer-subtitle"></div>
      </div>
      <button id="detail-close" class="drawer-close" type="button">关闭</button>
    </div>
    <div id="detail-body" class="drawer-body">
      <div class="empty-state">请选择任务查看详情</div>
    </div>
  </aside>

  <script src="/static/js/helpers.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
