<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务看板 - my-agent-teams</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>任务看板</h1>
    <div class="header-info">
      <span id="task-count"></span>
      <span id="last-update"></span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="kanban">看板</button>
    <button class="tab" data-tab="gantt">甘特图</button>
    <button class="tab" data-tab="agents">Agent 统计</button>
    <button class="tab" data-tab="analytics">分析</button>
    <button class="tab" data-tab="pool">任务池</button>
    <button class="tab" data-tab="integration-queue">集成队列</button>
    <button class="tab" data-tab="pm-inbox">PM Inbox</button>
  </nav>

  <main>
    <!-- Kanban View -->
    <section id="kanban" class="view active">
      <div class="filters-bar" id="kanban-filters">
        <select id="filter-project"><option value="">全部项目</option></select>
        <select id="filter-domain"><option value="">全部领域</option></select>
        <select id="filter-agent"><option value="">全部负责人</option></select>
        <select id="filter-owner-pm"><option value="">全部 Owner PM</option></select>
        <select id="filter-review-level"><option value="">全部审查级别</option></select>
        <select id="filter-merge-gate"><option value="">全部收口阶段</option></select>
        <button id="filter-reset" type="button" class="filter-reset">重置筛选</button>
      </div>
      <div class="kanban-board" id="kanban-board"></div>
    </section>

    <!-- Gantt View -->
    <section id="gantt" class="view">
      <div class="filters-bar gantt-filters" id="gantt-filters" aria-label="甘特图时间筛选">
        <div class="gantt-range-buttons" role="group" aria-label="快捷时间范围">
          <button type="button" class="gantt-range-btn" data-gantt-range="all">全部</button>
          <button type="button" class="gantt-range-btn" data-gantt-range="today">今天</button>
          <button type="button" class="gantt-range-btn" data-gantt-range="3d">近三天</button>
          <button type="button" class="gantt-range-btn active" data-gantt-range="7d">近七天</button>
          <button type="button" class="gantt-range-btn" data-gantt-range="30d">近一个月</button>
          <button type="button" class="gantt-range-btn" data-gantt-range="custom">自定义</button>
        </div>
        <div class="gantt-custom-range" aria-label="自定义日期范围">
          <input id="gantt-start-date" type="date" aria-label="甘特图开始日期">
          <span class="gantt-date-separator">至</span>
          <input id="gantt-end-date" type="date" aria-label="甘特图结束日期">
        </div>
        <span id="gantt-filter-hint" class="gantt-filter-hint">近七天</span>
      </div>
      <div id="gantt-chart" class="chart-container"></div>
    </section>

    <!-- Agent Stats View -->
    <section id="agents" class="view">
      <div id="agent-tasks-chart" class="chart-container half"></div>
      <div id="agent-load-chart" class="chart-container half"></div>
    </section>

    <!-- Analytics View -->
    <section id="analytics" class="view">
      <div class="analytics-summary" id="analytics-summary">
        <div class="metric-card" id="mc-total"><div class="metric-value">-</div><div class="metric-label">任务总数</div></div>
        <div class="metric-card" id="mc-done"><div class="metric-value">-</div><div class="metric-label">已完成</div></div>
        <div class="metric-card" id="mc-rate"><div class="metric-value">-</div><div class="metric-label">完成率</div></div>
        <div class="metric-card" id="mc-avg-cycle"><div class="metric-value">-</div><div class="metric-label">平均周期</div></div>
        <div class="metric-card" id="mc-avg-dev"><div class="metric-value">-</div><div class="metric-label">平均开发耗时</div></div>
        <div class="metric-card" id="mc-blocked"><div class="metric-value">-</div><div class="metric-label">阻塞率</div></div>
        <div class="metric-card" id="mc-pool-wait"><div class="metric-value">-</div><div class="metric-label">平均入池等待</div></div>
        <div class="metric-card" id="mc-claim-latency"><div class="metric-value">-</div><div class="metric-label">平均认领耗时</div></div>
        <div class="metric-card" id="mc-review-wait"><div class="metric-value">-</div><div class="metric-label">平均审查等待</div></div>
        <div class="metric-card" id="mc-rework-rate"><div class="metric-value">-</div><div class="metric-label">返工率</div></div>
      </div>
      <div class="analytics-charts">
        <div id="trend-chart" class="chart-container"></div>
        <div id="owner-pm-chart" class="chart-container half"></div>
        <div id="domain-chart" class="chart-container half"></div>
        <div id="role-efficiency-chart" class="chart-container"></div>
      </div>
    </section>

    <section id="pool" class="view">
      <div class="panel-summary" id="pool-summary"></div>
      <div class="panel-table-wrap">
        <table class="panel-table" id="pool-table">
          <thead>
            <tr>
              <th>任务</th>
              <th>优先级</th>
              <th>等待</th>
              <th>认领范围</th>
              <th>可认领</th>
              <th>阻塞原因</th>
              <th>下一步</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="integration-queue" class="view">
      <div class="panel-summary" id="integration-queue-summary"></div>
      <div class="panel-table-wrap">
        <table class="panel-table" id="integration-queue-table">
          <thead>
            <tr>
              <th>任务</th>
              <th>状态</th>
              <th>目标分支</th>
              <th>候选分支</th>
              <th>Patch</th>
              <th>工作区</th>
              <th>阻塞/说明</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="pm-inbox" class="view">
      <div class="panel-summary" id="pm-inbox-summary"></div>
      <div class="panel-table-wrap">
        <table class="panel-table" id="pm-inbox-table">
          <thead>
            <tr>
              <th>级别</th>
              <th>任务</th>
              <th>原因</th>
              <th>摘要</th>
              <th>等待</th>
              <th>建议动作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

  </main>

  <div id="task-detail-backdrop" class="detail-backdrop hidden"></div>
  <aside id="task-detail-drawer" class="task-detail-drawer hidden" aria-hidden="true">
    <div class="drawer-header">
      <div>
        <h2 id="detail-title">任务详情</h2>
        <div id="detail-subtitle" class="drawer-subtitle"></div>
      </div>
      <button id="detail-close" class="drawer-close" type="button">关闭</button>
    </div>
    <div id="detail-body" class="drawer-body">
      <div class="empty-state">请选择任务查看详情</div>
    </div>
  </aside>

  <script src="/static/js/helpers.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
